# ============================================================
#   Cyberpunk Starship preset  —  optional prompt
# ------------------------------------------------------------
#   Deployed to ~/.config/cyberpunk/starship.toml. Enable with:
#       cyber prompt starship     (then: cyber reload)
#   or set CYBERPUNK_PROMPT=starship in your environment.
#   Mirrors the custom prompt's two-line neon look.
# ============================================================

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
palette = "cyberpunk"

format = """
[╭─](bold purple)[▓▒░](purple) $username$hostname[in ](dimmed gray)$directory$git_branch$git_status$git_metrics$nodejs$python$rust$golang$cmd_duration
[╰─](bold purple)$character"""

right_format = "$time"

[palettes.cyberpunk]
cyan        = "#00d4ff"
bright_cyan = "#00ffff"
purple      = "#bd00ff"
soft_purple = "#a277ff"
pink        = "#ff006e"
magenta     = "#ff00ff"
green       = "#00ff9f"
yellow      = "#ffff00"
red         = "#ff3b3b"
gray        = "#4a5f7f"
fg          = "#e0f0ff"

[username]
show_always = true
format = "[$user]($style)"
style_user = "bold cyan"
style_root = "bold red"

[hostname]
ssh_only = false
format = "[@$hostname]($style) "
style = "soft_purple"

[directory]
style = "yellow"
truncation_length = 4
truncate_to_repo = true
read_only = " "
read_only_style = "red"
format = "[$path]($style)[$read_only]($read_only_style) "

[character]
success_symbol = "[❯](pink)[❯](purple)[❯](cyan)"
error_symbol = "[❯](red)[❯](red)[❯](red)"
vimcmd_symbol = "[❮](green)"

[git_branch]
symbol = " "
style = "cyan"
format = "[on ](dimmed gray)[$symbol$branch]($style) "

[git_status]
style = "red"
format = '([$all_status$ahead_behind]($style)) '
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
conflicted = "="
deleted = "✘${count}"
renamed = "»${count}"
modified = "✱${count}"
staged = "✚${count}"
untracked = "…${count}"
stashed = "⚑${count}"

[git_metrics]
disabled = false
added_style = "green"
deleted_style = "red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

[cmd_duration]
min_time = 200
style = "gray"
format = "[󱎫 $duration]($style) "

[nodejs]
symbol = "⬢ "
style = "green"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "yellow"
format = '[$symbol($version )]($style)'

[rust]
symbol = " "
style = "red"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "cyan"
format = "[$symbol($version )]($style)"

[time]
disabled = false
time_format = "%H:%M"
style = "gray"
format = "[$time]($style)"
