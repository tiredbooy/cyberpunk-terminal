# ============================================================
#   tmux/cyberpunk.tmux.conf — cyberpunk neon tmux theme
# ------------------------------------------------------------
#  A self-contained tmux config that mirrors the kitty + zsh
#  neon palette and binding vibe, so the cyberpunk look survives
#  on remote / headless boxes where kitty's GPU effects (blur,
#  cursor trail) can't follow you over ssh.
#
#  OPTIONAL / DOCUMENTED — tmux is not required by the rest of
#  the project. To use it:
#       tmux -f ~/.config/cyberpunk/cyberpunk.tmux.conf
#  or add to ~/.tmux.conf:
#       source-file ~/.config/cyberpunk/cyberpunk.tmux.conf
#
#  Palette (locked "neon" preset — keep in sync with
#  theme/themes/neon.sh):
#     base   #0a0e14   fg     #e0f0ff
#     cyan   #00d4ff   cyan!  #00ffff
#     purple #bd00ff   purple!#a277ff
#     pink   #ff006e   pink!  #ff00ff
#     green  #00ff9f   yellow #ffff00   red #ff3355
# ============================================================

# ----- terminal / truecolor -----------------------------------------------
# Advertise 256-color and let kitty/modern terminals get real truecolor.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-kitty:Tc"
set -ga terminal-overrides ",*:Tc"

# Snappier escape handling (kept cheap, no surprises for vim users).
set -sg escape-time 10
set -g focus-events on
set -g history-limit 10000

# ----- general behaviour --------------------------------------------------
set -g base-index 1            # windows start at 1
setw -g pane-base-index 1      # panes start at 1
set -g renumber-windows on     # keep window numbers contiguous
set -g mouse on
set -g set-titles on
set -g set-titles-string "#{session_name}  #W"
setw -g mode-keys vi
set -g display-time 2000
set -g status-interval 5

# ----- prefix + keybinds (mirror the kitty_mod vibe) ----------------------
# Default prefix stays C-b so muscle memory and ssh hosts are unsurprised;
# C-a is added as a friendly second prefix.
set -g prefix C-b
set -g prefix2 C-a
bind C-b send-prefix

# Reload this config.
bind r source-file ~/.config/cyberpunk/cyberpunk.tmux.conf \; display-message " cyberpunk tmux reloaded"

# Splits that remember the current path (| horizontal, - vertical).
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in the current path.
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (repeatable).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching (repeatable).
bind -r n next-window
bind -r p previous-window

# vi-style copy mode + clipboard (falls back gracefully if no copy tool).
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ----- neon palette -------------------------------------------------------
# Define palette as user options so the styling below reads cleanly and a
# future theme switcher could rewrite just these lines.
set -g @cyb_base    "#0a0e14"
set -g @cyb_fg      "#e0f0ff"
set -g @cyb_cyan    "#00d4ff"
set -g @cyb_cyanb   "#00ffff"
set -g @cyb_purple  "#bd00ff"
set -g @cyb_purpleb "#a277ff"
set -g @cyb_pink    "#ff006e"
set -g @cyb_pinkb   "#ff00ff"
set -g @cyb_green   "#00ff9f"
set -g @cyb_yellow  "#ffff00"
set -g @cyb_red     "#ff3355"
set -g @cyb_gray    "#1a1f29"

# ----- messages / command prompt -----------------------------------------
set -g message-style "fg=#00ffff,bg=#0a0e14,bold"
set -g message-command-style "fg=#00ff9f,bg=#0a0e14"

# ----- pane borders -------------------------------------------------------
set -g pane-border-style "fg=#1a1f29"
set -g pane-active-border-style "fg=#00d4ff"
set -g pane-border-lines heavy

# ----- copy-mode / selection ----------------------------------------------
setw -g mode-style "fg=#0a0e14,bg=#bd00ff,bold"

# ----- clock --------------------------------------------------------------
setw -g clock-mode-colour "#00d4ff"
setw -g clock-mode-style 24

# ----- status bar ---------------------------------------------------------
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#e0f0ff,bg=#0a0e14"

# Left: a glowing session badge.
set -g status-left-length 40
set -g status-left "#[fg=#0a0e14,bg=#00d4ff,bold]  #S #[fg=#00d4ff,bg=#0a0e14,nobold]"

# Right: prefix indicator, host, time/date in neon accents.
set -g status-right-length 90
set -g status-right "#{?client_prefix,#[fg=#0a0e14#,bg=#ff006e#,bold] PREFIX #[default],}#[fg=#a277ff,bg=#0a0e14]#[fg=#0a0e14,bg=#a277ff,bold]  #h #[fg=#00ff9f,bg=#0a0e14]#[fg=#0a0e14,bg=#00ff9f,bold]  %H:%M #[fg=#bd00ff,bg=#00ff9f]#[fg=#e0f0ff,bg=#bd00ff,bold]  %d %b "

# ----- window tabs (powerline-ish neon segments) --------------------------
set -g window-status-separator ""

# Inactive window: dim cyan label on the base.
set -g window-status-style "fg=#4a5f7f,bg=#0a0e14"
set -g window-status-format " #I #[fg=#e0f0ff]#W#{?window_zoomed_flag, #[fg=#ffff00]󰊓,} "

# Active window: bright pink->base powerline wedge.
set -g window-status-current-style "fg=#0a0e14,bg=#00d4ff,bold"
set -g window-status-current-format "#[fg=#00d4ff,bg=#0a0e14]#[fg=#0a0e14,bg=#00d4ff,bold] #I #[fg=#bd00ff]#W#{?window_zoomed_flag, 󰊓,} #[fg=#00d4ff,bg=#0a0e14]"

# Activity / bell highlight.
set -g window-status-activity-style "fg=#ffff00,bg=#0a0e14,blink"
set -g window-status-bell-style "fg=#ff3355,bg=#0a0e14,bold"
setw -g monitor-activity on
set -g visual-activity off
