name: CI

# Cyberpunk Terminal continuous integration.
# Lints and syntax-checks every script, validates the generated config
# artifacts, then proves a minimal install boots on a clean Ubuntu runner.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------
  #  Static analysis: shellcheck + bash/zsh -n
  # ----------------------------------------------------------
  shell:
    name: Shell lint & syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck & zsh
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck zsh

      - name: shellcheck (*.sh)
        run: |
          # --severity=warning lets stylistic info notes through while still
          # failing on real warnings/errors.
          # Reasonable excludes for an opinionated dotfiles installer:
          #   SC1090/SC1091 — sourcing dynamic/non-existent paths at runtime
          #   SC2155        — declare+assign style used throughout
          #   SC2034        — palette vars consumed by sourcing scripts
          #   SC2086/SC2046 — intentional word splitting for package lists
          mapfile -t files < <(find . -type f -name '*.sh' -not -path './.git/*' | sort)
          printf 'Linting %d shell script(s):\n' "${#files[@]}"
          printf '  %s\n' "${files[@]}"
          shellcheck --shell=bash --severity=warning \
            --exclude=SC1090,SC1091,SC2155,SC2034,SC2086,SC2046 \
            "${files[@]}"

      - name: bash -n (*.sh)
        run: |
          rc=0
          while IFS= read -r f; do
            if bash -n "$f"; then
              echo "ok   $f"
            else
              echo "FAIL $f"; rc=1
            fi
          done < <(find . -type f -name '*.sh' -not -path './.git/*' | sort)
          exit "$rc"

      - name: zsh -n (zsh sources)
        run: |
          rc=0
          # The deployed ~/.zshrc lives as zshrc-config.txt; check it plus any *.zsh.
          targets=()
          [ -f zsh/zshrc-config.txt ] && targets+=("zsh/zshrc-config.txt")
          while IFS= read -r f; do
            targets+=("$f")
          done < <(find . -type f -name '*.zsh' -not -path './.git/*' | sort)
          for f in "${targets[@]}"; do
            if zsh -n "$f"; then
              echo "ok   $f"
            else
              echo "FAIL $f"; rc=1
            fi
          done
          exit "$rc"

  # ----------------------------------------------------------
  #  Python tab bar + config artifact validation
  # ----------------------------------------------------------
  artifacts:
    name: Python & config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: py_compile tab_bar.py
        run: |
          if [ -f kitty/tab_bar.py ]; then
            python -m py_compile kitty/tab_bar.py
            echo "ok kitty/tab_bar.py"
          else
            echo "kitty/tab_bar.py not present — skipping"
          fi

      - name: Validate JSON artifacts
        run: |
          rc=0
          while IFS= read -r f; do
            if python -c "import json,sys; json.load(open(sys.argv[1]))" "$f"; then
              echo "ok   $f"
            else
              echo "FAIL $f"; rc=1
            fi
          done < <(find . -type f -name '*.json' -not -path './.git/*' | sort)
          exit "$rc"

      - name: Validate TOML (starship)
        run: |
          rc=0
          while IFS= read -r f; do
            if python -c "import tomllib,sys; tomllib.load(open(sys.argv[1],'rb'))" "$f"; then
              echo "ok   $f"
            else
              echo "FAIL $f"; rc=1
            fi
          done < <(find . -type f -name '*.toml' -not -path './.git/*' | sort)
          exit "$rc"

  # ----------------------------------------------------------
  #  Clean-room minimal install smoke test
  # ----------------------------------------------------------
  install-smoke:
    name: Minimal install smoke test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run minimal install
        run: |
          chmod +x ./install.sh
          ./install.sh --yes --no-chsh --no-font --minimal

      - name: Assert ~/.zshrc was deployed
        run: |
          test -f "$HOME/.zshrc" || { echo "::error::~/.zshrc was not created"; exit 1; }
          echo "ok ~/.zshrc exists"

      - name: Boot zsh interactively
        run: |
          # grep -qx (exact-line match) tolerates other stdout lines from
          # shell init while still proving the interactive shell booted.
          out="$(zsh -ic 'echo CYBER_CI_OK' 2>/dev/null)"
          echo "zsh said: $out"
          printf '%s\n' "$out" | grep -qx CYBER_CI_OK \
            || { echo "::error::interactive zsh did not boot cleanly"; exit 1; }
