# ~/.config/kitty/kitty.conf

# ===== FONT CONFIGURATION =====
font_family      FiraCode Nerd Font Mono
bold_font        FiraCode Nerd Font Mono Bold
italic_font      FiraCode Nerd Font Mono Italic
bold_italic_font FiraCode Nerd Font Mono Bold Italic
font_size        12.0

# Font features
disable_ligatures never
font_features    FiraCodeNerdFont-Regular +cv02 +cv05 +cv09 +cv14 +ss04 +cv16 +cv31

# Symbol fallback — render Nerd Font glyphs even if the base font lacks them.
symbol_map U+E000-U+F8FF,U+F0001-U+FFFFE,U+E0A0-U+E0D7 FiraCode Nerd Font Mono

# ===== CURSOR CONFIGURATION =====
cursor_shape beam
cursor_beam_thickness 2.0
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# ===== WINDOW LAYOUT =====
window_padding_width 16 20
window_margin_width 0
single_window_margin_width -1
placement_strategy center
confirm_os_window_close 0
remember_window_size  yes
initial_window_width  120c
initial_window_height 32c

# Available split/window layouts (cycle with ctrl+shift+l)
enabled_layouts splits:split_axis=horizontal,stack,tall,fat,grid

# Modern window style
window_border_width 2pt
draw_minimal_borders yes
active_border_color #00d4ff
inactive_border_color #1a1f29

# ===== BACKGROUND & OPACITY =====
background_opacity 0.80
dynamic_background_opacity yes

# Heavy blur for glassmorphism effect
background_blur 80
background_tint 0.75

# ===== SCROLLBACK =====
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
wheel_scroll_multiplier 3.0

# ===== MOUSE =====
mouse_hide_wait 3.0
url_color #9ad0f5
url_style curly
open_url_with default
detect_urls yes
copy_on_select yes

# ===== PERFORMANCE =====
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ===== BELL =====
enable_audio_bell no
visual_bell_duration 0.0

# ===== TAB BAR =====
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style angled
tab_bar_min_tabs 2
tab_title_template " {index}: {title} "
active_tab_font_style bold-italic
inactive_tab_font_style normal
tab_bar_margin_width 0.0
tab_bar_margin_height 2.0 0.0
tab_bar_align left

# ===== COLOR SCHEME (Cyberpunk Neon) =====
# Basic colors
foreground #e0f0ff
background #0a0e14
selection_foreground #0a0e14
selection_background #00d4ff

# Cursor colors - Neon cyan
cursor #00ffff
cursor_text_color #0a0e14

# URL underline color - Electric blue
url_color #00d4ff

# Tab bar colors - Cyberpunk style
active_tab_foreground   #0a0e14
active_tab_background   #00ffff
inactive_tab_foreground #4a5f7f
inactive_tab_background #151920
tab_bar_background      #0a0e14
tab_bar_margin_color    #00d4ff

# Black
color0 #0a0e14
color8 #1f2933

# Red - Cyber red/pink
color1 #ff006e
color9 #ff3399

# Green - Neon green
color2  #00ff9f
color10 #39ff14

# Yellow - Electric yellow
color3  #ffff00
color11 #ffed4e

# Blue - Electric blue/cyan
color4  #00d4ff
color12 #00ffff

# Magenta - Neon pink/purple
color5  #ff00ff
color13 #bd00ff

# Cyan - Bright cyan
color6  #00ffff
color14 #80ffea

# White
color7  #e0f0ff
color15 #ffffff

# ===== ADVANCED =====
shell zsh
editor nvim
close_on_child_death no
allow_remote_control yes
listen_on unix:@mykitty

# Shell integration: prompt marks, jump-to-prompt, current-dir inheritance.
shell_integration enabled

# Reload this config live with ctrl+shift+f5 (defined below).

# Clipboard
clipboard_control write-clipboard write-primary read-clipboard read-primary

# ===== KEYBOARD SHORTCUTS =====
# Clear all default shortcuts first (optional)
# clear_all_shortcuts yes

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Windows / splits
map ctrl+shift+enter new_window
map ctrl+shift+w close_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window
map ctrl+shift+o new_os_window
map ctrl+shift+f move_window_forward
map ctrl+shift+b move_window_backward
# Split the current window (uses the 'splits' layout)
map ctrl+shift+\ launch --location=vsplit --cwd=current
map ctrl+shift+- launch --location=hsplit --cwd=current
# Cycle the active layout
map ctrl+shift+l next_layout
# Navigate splits, vim-style (arrows stay reserved for scrolling)
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up

# Tabs
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+q close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+. move_tab_forward
map ctrl+shift+, move_tab_backward
map ctrl+shift+r set_tab_title
# Jump straight to a tab by number
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5

# Font size
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0 change_font_size all 0

# Scrolling
map ctrl+shift+up scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+page_up scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end

# Opacity
map ctrl+shift+a>m set_background_opacity +0.05
map ctrl+shift+a>l set_background_opacity -0.05
map ctrl+shift+a>1 set_background_opacity 1
map ctrl+shift+a>d set_background_opacity default

# Hints — pick things off the screen with the keyboard
map ctrl+shift+e open_url_with_hints
map ctrl+shift+p>f kitten hints --type path --program -
map ctrl+shift+p>l kitten hints --type line --program -
map ctrl+shift+p>w kitten hints --type word --program -
map ctrl+shift+p>h kitten hints --type hash --program -

# Misc
map ctrl+shift+f5 load_config_file
map ctrl+shift+delete clear_terminal reset active
map ctrl+shift+u kitten unicode_input
map ctrl+shift+f2 edit_config_file

# ===== STARTUP =====
startup_session none
# Run your welcome script
# shell_integration enabled
