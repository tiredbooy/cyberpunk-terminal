# ~/.config/kitty/kitty.conf

# ===== FONT CONFIGURATION =====
font_family      FiraCode Nerd Font Mono
bold_font        FiraCode Nerd Font Mono Bold
italic_font      FiraCode Nerd Font Mono Italic
bold_italic_font FiraCode Nerd Font Mono Bold Italic
font_size        12.0

# Font features
disable_ligatures never
font_features    FiraCodeNerdFont-Regular +cv02 +cv05 +cv09 +cv14 +ss04 +cv16 +cv31

# Symbol fallback — render Nerd Font glyphs even if the base font lacks them.
symbol_map U+E000-U+F8FF,U+F0001-U+FFFFE,U+E0A0-U+E0D7 FiraCode Nerd Font Mono

# ===== CURSOR CONFIGURATION =====
cursor_shape beam
cursor_beam_thickness 2.0
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# Neon cursor trail — a glowing comet streaks behind the cursor as it moves.
# Requires kitty >= 0.36. Older versions print a harmless warning and ignore it.
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# ===== WINDOW LAYOUT =====
window_padding_width 16 20
window_margin_width 0
single_window_margin_width -1
placement_strategy center
confirm_os_window_close 0
remember_window_size  yes
initial_window_width  120c
initial_window_height 32c

# Available split/window layouts (cycle with kitty_mod+l)
enabled_layouts splits:split_axis=horizontal,stack,tall,fat,grid

# Modern window style
window_border_width 2pt
draw_minimal_borders yes
active_border_color #00d4ff
inactive_border_color #1a1f29

# ===== BACKGROUND & OPACITY =====
background_opacity 0.85
dynamic_background_opacity yes

# Heavy blur for glassmorphism effect
background_blur 80
background_tint 0.75

# ===== SCROLLBACK =====
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
wheel_scroll_multiplier 3.0

# ===== MOUSE =====
mouse_hide_wait 3.0
url_color #9ad0f5
url_style curly
open_url_with default
detect_urls yes
copy_on_select yes

# ===== PERFORMANCE =====
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ===== BELL & NOTIFICATIONS =====
enable_audio_bell no
visual_bell_duration 0.0

# Desktop notification when a long command (>10s) finishes while this
# window is unfocused. Needs shell_integration (enabled below).
notify_on_cmd_finish unfocused 10.0

# ===== TAB BAR =====
tab_bar_edge top
# Custom tab bar: powerline tabs on the left + a live status cluster
# (load · battery · clock) on the right. Drawn by ~/.config/kitty/tab_bar.py.
# Set this back to `powerline` if you remove tab_bar.py.
tab_bar_style custom
tab_powerline_style angled
tab_bar_min_tabs 2
tab_title_template " {index}: {title} "
active_tab_font_style bold-italic
inactive_tab_font_style normal
tab_bar_margin_width 0.0
tab_bar_margin_height 2.0 0.0
tab_bar_align left

# ===== COLOR SCHEME (Cyberpunk) =====
# Colors are generated by `cyber theme` and live in kitty-theme.conf (resolved
# under ~/.config/kitty/). The shipped default is theme/kitty-theme.conf (neon).
# Switch palettes with `cyber theme <name>` — never edit colors here.
include kitty-theme.conf

# ===== ADVANCED =====
shell zsh
editor nvim
close_on_child_death no
allow_remote_control yes
listen_on unix:@mykitty

# Shell integration: prompt marks, jump-to-prompt, current-dir inheritance.
shell_integration enabled

# Reload this config live with kitty_mod+f5 (defined below).

# Clipboard
clipboard_control write-clipboard write-primary read-clipboard read-primary

# ===== KEYBOARD SHORTCUTS =====
# Clear all default shortcuts first (optional)
# clear_all_shortcuts yes

# Primary modifier for all cyberpunk keybinds. Change this one line to remap
# every map below at once (e.g. to super+shift on macOS-style layouts).
kitty_mod ctrl+shift

# Clipboard
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard

# Windows / splits
map kitty_mod+enter new_window
map kitty_mod+w close_window
map kitty_mod+] next_window
map kitty_mod+[ previous_window
map kitty_mod+o new_os_window
map kitty_mod+f move_window_forward
map kitty_mod+b move_window_backward
# Split the current window (uses the 'splits' layout)
map kitty_mod+\ launch --location=vsplit --cwd=current
map kitty_mod+- launch --location=hsplit --cwd=current
# Cycle the active layout
map kitty_mod+l next_layout
# Navigate splits, vim-style (arrows stay reserved for scrolling)
map kitty_mod+h neighboring_window left
map kitty_mod+j neighboring_window down
map kitty_mod+k neighboring_window up

# Tabs
map kitty_mod+t new_tab_with_cwd
map kitty_mod+q close_tab
map kitty_mod+right next_tab
map kitty_mod+left previous_tab
map kitty_mod+. move_tab_forward
map kitty_mod+, move_tab_backward
map kitty_mod+r set_tab_title
# Jump straight to a tab by number
map kitty_mod+1 goto_tab 1
map kitty_mod+2 goto_tab 2
map kitty_mod+3 goto_tab 3
map kitty_mod+4 goto_tab 4
map kitty_mod+5 goto_tab 5

# Font size
map kitty_mod+equal change_font_size all +1.0
map kitty_mod+minus change_font_size all -1.0
map kitty_mod+0 change_font_size all 0

# Scrolling
map kitty_mod+up scroll_line_up
map kitty_mod+down scroll_line_down
map kitty_mod+page_up scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+home scroll_home
map kitty_mod+end scroll_end

# Opacity
map kitty_mod+a>m set_background_opacity +0.05
map kitty_mod+a>l set_background_opacity -0.05
map kitty_mod+a>1 set_background_opacity 1
map kitty_mod+a>d set_background_opacity default

# Hints — pick things off the screen with the keyboard
map kitty_mod+e open_url_with_hints
map kitty_mod+p>f kitten hints --type path --program -
map kitty_mod+p>l kitten hints --type line --program -
map kitty_mod+p>w kitten hints --type word --program -
map kitty_mod+p>h kitten hints --type hash --program -

# ===== TUI TOOL LAUNCHERS (overlay — closes back to where you were) =====
# Each opens as an overlay on top of the current window; quit the tool
# (q) and you land exactly back where you started. Tools degrade
# gracefully — if one isn't installed the overlay just shows an error.
map kitty_mod+g launch --type=overlay --cwd=current lazygit
map kitty_mod+n launch --type=overlay btop
map kitty_mod+y launch --type=overlay --cwd=current yazi
# Quick cheatsheet of cyberpunk keybinds & commands.
map kitty_mod+f1 launch --type=overlay --title "cyberpunk help" --env CYBERPUNK_WELCOME_SHOWN=1 zsh -ic 'cyber help 2>/dev/null || cat ~/.config/kitty/cyberpunk-help.txt 2>/dev/null; print -n "\n  Press Enter to close…"; read'

# ===== POWER OVERLAYS (new) — verified non-colliding keys =====
# Live-grep across the tree: ripgrep results piped to fzf, open the pick in
# $EDITOR (falls back to nvim) at the matched line. Needs rg + fzf.
map kitty_mod+x launch --type=overlay --cwd=current zsh -ic 'command -v rg >/dev/null && command -v fzf >/dev/null || { print "rg + fzf required"; sleep 2; exit; }; sel=$(rg --line-number --no-heading --color=always --smart-case "" 2>/dev/null | fzf --ansi --delimiter : --preview "bat --style=numbers --color=always --highlight-line {2} {1} 2>/dev/null || sed -n {2}p {1}"); [ -n "$sel" ] && f=${sel%%:*} && rest=${sel#*:} && ln=${rest%%:*} && ${EDITOR:-nvim} +$ln "$f"'
# Open the OUTPUT of the last command in nvim (read-only scratch buffer).
map kitty_mod+i launch --type=overlay --stdin-source=@last_cmd_output nvim -R -
# Open the full scrollback buffer in nvim.
map kitty_mod+m launch --type=overlay --stdin-source=@screen_scrollback nvim -R -
# SSH to a host with the ssh kitten (sets up shell integration remotely).
map kitty_mod+s launch --type=overlay kitten ssh
# Broadcast typed input to ALL windows at once (great for fleets).
map kitty_mod+z launch --allow-remote-control kitten broadcast

# ===== kitty_mod+d>  CHORD NAMESPACE  (free prefix; collision-free) =====
# 'd' alone and the whole 'd>' chord space were unused (only a> opacity
# and p> hints chords existed). Sub-keys are partitioned across the three
# features so nothing collides:
#   d>c / d>x  -> CRT effects   (toggle / force-off)
#   d>s        -> context HUD   (status / show)
#   d>a/f/w/g  -> The Deck AI   (ask / fix / why / git-commit-assist)
# Interactive overlays set --env CYBERPUNK_WELCOME_SHOWN=1 so the welcome
# dashboard does NOT render inside them (matches the kitty_mod+f1 chord).

# ----- EFFECTS — CRT background (opt-in, OFF by default) -----
# Backgrounded shell so the toggle never steals a window. The CRT layer
# fights background_blur 80 + opacity and can hurt contrast — the default
# 'subtle' is faint. d>c toggles it; d>x force-clears it.
map kitty_mod+d>c launch --type=background zsh -ic 'cyber crt toggle'
map kitty_mod+d>x launch --type=background zsh -ic 'cyber crt off'

# ----- CONTEXT HUD — flash the live operational context in an overlay -----
map kitty_mod+d>s launch --type=overlay --title "cyber ctx" --env CYBERPUNK_WELCOME_SHOWN=1 zsh -ic 'cyber ctx refresh; cyber ctx; print -n "\n  Press Enter to close…"; read'

# ----- THE DECK — AI copilot (opt-in; requires CYB_AI=1) -----
# Run-and-show overlays only (a throwaway interactive shell, so print -z
# does not stage back to the source window — type `cyber ai/fix/why/gca`
# in your shell for the robust staging path).
map kitty_mod+d>a launch --type=overlay --env CYBERPUNK_WELCOME_SHOWN=1 zsh -ic 'cyber ai 2>/dev/null; print -n "\n  Press Enter to close…"; read'
map kitty_mod+d>f launch --type=overlay --env CYBERPUNK_WELCOME_SHOWN=1 zsh -ic 'cyber fix 2>/dev/null; print -n "\n  Press Enter to close…"; read'
map kitty_mod+d>w launch --type=overlay --env CYBERPUNK_WELCOME_SHOWN=1 zsh -ic 'cyber why 2>/dev/null; print -n "\n  Press Enter to close…"; read'
map kitty_mod+d>g launch --type=overlay --cwd=current --env CYBERPUNK_WELCOME_SHOWN=1 zsh -ic 'cyber gca 2>/dev/null; print -n "\n  Press Enter to close…"; read'

# Misc
map kitty_mod+f5 load_config_file
map kitty_mod+delete clear_terminal reset active
map kitty_mod+u kitten unicode_input
map kitty_mod+f2 edit_config_file

# Hints — pick things off the screen with the keyboard
map ctrl+shift+e open_url_with_hints
map ctrl+shift+p>f kitten hints --type path --program -
map ctrl+shift+p>l kitten hints --type line --program -
map ctrl+shift+p>w kitten hints --type word --program -
map ctrl+shift+p>h kitten hints --type hash --program -

# ===== TUI TOOL LAUNCHERS (overlay — closes back to where you were) =====
# Each opens as an overlay on top of the current window; quit the tool
# (q) and you land exactly back where you started. Tools degrade
# gracefully — if one isn't installed the overlay just shows an error.
map ctrl+shift+g launch --type=overlay --cwd=current lazygit
map ctrl+shift+n launch --type=overlay btop
map ctrl+shift+y launch --type=overlay --cwd=current yazi
# Quick cheatsheet of cyberpunk keybinds & commands.
map ctrl+shift+f1 launch --type=overlay --title "cyberpunk help" --env CYBERPUNK_WELCOME_SHOWN=1 zsh -ic 'cyber help 2>/dev/null || cat ~/.config/kitty/cyberpunk-help.txt 2>/dev/null; print -n "\n  Press Enter to close…"; read'

# Misc
map ctrl+shift+f5 load_config_file
map ctrl+shift+delete clear_terminal reset active
map ctrl+shift+u kitten unicode_input
map ctrl+shift+f2 edit_config_file

# ===== STARTUP =====
# The neon welcome dashboard is launched from .zshrc (once per window).
# Ready-made layouts live in ~/.config/kitty/sessions/ — load one with:
#   kitty --session ~/.config/kitty/sessions/dev.session
startup_session none
